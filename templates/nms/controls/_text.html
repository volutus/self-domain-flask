<label for="{{element_id}}" class="block mb-2 text-white">
      {{element_label}}
</label>
<input class="w-full bg-gray-200 rounded p-3"
placeholder="{{element_label}}" id="{{element_id}}" name="{{element_id}}" value="{{element_value}}" 
{% if pattern %} pattern="{{pattern}}" {% endif %} title="{{element_title}}"/>
