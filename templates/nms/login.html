

{% extends "layout.html" %}
{% block title %}NMS Login{% endblock %}

{% block content %}

<div class="flex h-screen bg-gray-800">
    <div class="w-full max-w-xs m-auto bg-gray-300 rounded p-5">
        <header>
            <img class="w-20 mx-auto mb-5" src="{{ url_for('static', filename='img/noodles.svg') }}" />
            <h2 class="p-2 text-2xl text-center">NMS Login</h2>
        </header>
        <form>
            <div>
                <label class="block mb-2" for="username">Username</label>
                <input
                    class="w-full p-2 mb-6 border-b-2 outline-none focus:bg-gray-300"
                    type="text" name="username">
            </div>
            <div>
                <label class="block mb-2" for="password">Password</label>
                <input
                    class="w-full p-2 mb-6 border-b-2 outline-none focus:bg-gray-300"
                    type="password" name="password">
            </div>
            <div>
                <button class="w-full text-white bg-black font-bold py-2 px-4 mb-6 rounded cursor-pointer"
                    type="submit">Log In</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
